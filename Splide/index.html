<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splide Example</title>

    <!-- LINK TO CSS -->
    <link rel="stylesheet" href="splide.min.css">
    <link rel="stylesheet" href="main.css">

    <!-- LINK TO JS -->
    <script defer src="splide.min.js"></script>
    <script defer src="index.js"></script>

    <!-- make sure to load splide first by putting it above our css / js -->
</head>
<body>

    <h1>Splide Example</h1>

    <!-- COPY/PASTED SPLIDE CODE -->
    <section id="splide-container-1" class="splide" aria-label="Splide Basic HTML Example">
        <div class="splide__track">
                <ul class="splide__list">
                    <!-- SLIDE 1 -->
                    <li class="splide__slide">
                        <img src="https://www.ez-dock.com/content/uploads/2017/12/ClarkV_170815__P2A0476.jpg" alt="walkway pier" />
                    </li>
                    
                    <!-- SLIDE 2 -->
                    <li class="splide__slide">
                        <img src="https://www.statueoflibertytour.com/wp-content/uploads/2022/05/statue-of-liberty-gaffb1612d_1920.jpg" alt="statue of liberty">
                    </li>

                    <!-- SLIDE 3 -->
                    <li class="splide__slide">
                        <img src="https://www.travelandleisure.com/thmb/LX4znxqtKQYJ3QPu4ArNCuvJw_s=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc()/seljalandsfoss-iceland-1-WATERFALLS1021-e9c2348a42c841d5b9d661d16dcdcf8c.jpg" alt="waterfall">
                    </li>

                    <!-- SLIDE 4 -->
                    <li class="splide__slide">
                        <img src="https://alittleadrift.com/wp-content/uploads/2011/09/best-waterfalls-world.jpeg" alt="waterfall">
                    </li>
                </ul>
        </div>
    </section>
    
</body>
</html>
